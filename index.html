<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Digital Reader</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #333;
      overflow: hidden;
    }
    #book-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="book-container"></div>

  <!-- Dependencies -->
  <script src="js/jquery.min.js"></script>
  <script src="js/three.min.js"></script>
  <script src="js/html2canvas.min.js"></script>
  <script src="js/pdf.min.js"></script>
  
  <!-- Flipbook plugin -->
  <script src="dist/flip-book.js?v=2.0.1"></script>
  
  <!-- Config -->
  <script src="config.js"></script>
  
  <script>
    $(document).ready(function() {
      const pdfUrl = (window.FLIPBOOK_CONFIG && window.FLIPBOOK_CONFIG.pdfUrl) || 'assets/simple.pdf';
      $('#book-container').FlipBook({
        pdf: pdfUrl,
        template: {
          html: 'templates/default-book-view.html',
          styles: [
            'css/font-awesome.min.css',
            'css/short-black-book-view.css'
          ],
          links: [
            {
              rel: 'stylesheet',
              href: 'css/font-awesome.min.css'
            }
          ],
          script: 'js/default-book-view.js'
        }
      });
    });
  </script>
</body>
</html>
